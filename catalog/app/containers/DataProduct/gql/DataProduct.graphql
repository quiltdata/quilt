query ($id: ID!) {
  dataProduct(id: $id) {
    id
    name
    title
    description
    createdAt
    ownerRole {
      __typename
      ... on ManagedRole {
        name
      }
      ... on UnmanagedRole {
        name
      }
    }
    members {
      objects {
        logicalKey
        bucket
        key
        versionId
      }
      packages {
        virtualName
        bucket
        name
        hashOrTag
      }
    }
  }
}
