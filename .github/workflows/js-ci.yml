on:
  push:
    branches:
      - master
    tags:
      - "*"
  pull_request:
  merge_group:
jobs:
  # Detect whether anything catalog-related changed. Every catalog job is gated
  # on this so unrelated PRs don't spin up the (slow) npm jobs; `catalog-ready`
  # still runs and passes, so it can be the single required status check.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      catalog: ${{ steps.filter.outputs.catalog }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            catalog:
              - '.github/workflows/js-ci.yml'
              - '.github/workflows/deploy-catalog.yaml'
              - 'catalog/**'
              - 'shared/**'

  lint:
    needs: changes
    if: needs.changes.outputs.catalog == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: catalog
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'catalog/package.json'
          cache: 'npm'
          cache-dependency-path: 'catalog/package-lock.json'
      - run: npm ci
      - run: npm run lint

  typecheck:
    needs: changes
    if: needs.changes.outputs.catalog == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: catalog
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'catalog/package.json'
          cache: 'npm'
          cache-dependency-path: 'catalog/package-lock.json'
      - run: npm ci
      - run: npm run typecheck

  test:
    needs: changes
    if: needs.changes.outputs.catalog == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: catalog
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'catalog/package.json'
          cache: 'npm'
          cache-dependency-path: 'catalog/package-lock.json'
      - run: npm ci
      - run: npm test
      - uses: codecov/codecov-action@v7
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          flags: catalog
          name: ${{ github.job }}

  build:
    needs: changes
    if: needs.changes.outputs.catalog == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: catalog
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'catalog/package.json'
          cache: 'npm'
          cache-dependency-path: 'catalog/package-lock.json'
      - run: npm ci
      - run: npm run build
      - env:
          BUNDLEWATCH_GITHUB_TOKEN: ${{ secrets.BUNDLEWATCH_GITHUB_TOKEN }}
        run: npm run bundlewatch

  # Build the catalog image and push it to ECR. Folded in from the standalone
  # deploy workflow: it only pushes on master, but the reusable workflow stays
  # independently dispatchable (workflow_dispatch) for ad-hoc/dev builds.
  deploy-catalog:
    needs: [changes, lint, typecheck, test, build]
    if: github.ref == 'refs/heads/master' && needs.changes.outputs.catalog == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-catalog.yaml
    with:
      push_targets: '["prod","mp","govcloud"]'

  # Single aggregate gate for branch protection: passes when no catalog job
  # failed or was cancelled (skipped == fine, so unrelated PRs are green).
  catalog-ready:
    if: always()
    needs: [changes, lint, typecheck, test, build, deploy-catalog]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all catalog checks passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ||
                "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "Catalog CI failed or was cancelled"
            exit 1
          fi

  lint-docs:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'catalog/package.json'
      - run: npx --package=markdownlint-cli markdownlint .
