fragment UnmanagedRoleSelection on UnmanagedRole {
  __typename
  id
  name
  arn
}
fragment PolicySummarySelection on Policy {
  id
  title
  arn
  managed
  permissions {
    ...PermissionSelection
  }
}
fragment RoleBucketPermissionSelection on RoleBucketPermission {
  bucket {
    name
  }
  level
}
fragment ManagedRoleSelection on ManagedRole {
  __typename
  id
  name
  arn
  policies {
    ...PolicySummarySelection
  }
  permissions {
    ...RoleBucketPermissionSelection
  }
}
fragment RoleSelection on Role {
  __typename
  ...UnmanagedRoleSelection
  ...ManagedRoleSelection
}
fragment UserLastLoginContextSelection on UserLastLoginContext {
  ssoProvider
  idTokenPayload
  matchedMappingIndices
  assignedRoles
  activeRole
  isAdmin
  loginAt
}
fragment UserSelection on User {
  name
  email
  dateJoined
  lastLogin
  isActive
  isAdmin
  isSsoOnly
  isService
  role {
    ...RoleSelection
  }
  extraRoles {
    ...RoleSelection
  }
  lastLoginContext {
    ...UserLastLoginContextSelection
  }
}
fragment UserMutationSelection on UserResult {
  ...UserSelection
  ...InvalidInputSelection
  ...OperationErrorSelection
}
fragment InvalidInputSelection on InvalidInput {
  errors {
    path
    message
    name
    context
  }
}
fragment OperationErrorSelection on OperationError {
  message
  name
  context
}
fragment PermissionSelection on PolicyBucketPermission {
  bucket {
    name
  }
  level
}
fragment PolicySelection on Policy {
  id
  title
  arn
  managed
  permissions {
    ...PermissionSelection
  }
  roles {
    ...ManagedRoleSelection
  }
}
fragment APIKeySelection on APIKey {
  id
  name
  fingerprint
  createdAt
  expiresAt
  lastUsedAt
  status
  userEmail
}
fragment SsoConfigSelection on SsoConfig {
  text
  timestamp
  uploader {
    ...UserSelection
  }
}

query rolesList {
  roles {
    ...RoleSelection
  }
}

query roleGet($id: ID!) {
  role(id: $id) {
    ...RoleSelection
  }
}

query policiesList {
  policies {
    ...PolicySelection
  }
}

query policyGet($id: ID!) {
  policy(id: $id) {
    ...PolicySelection
  }
}

query defaultRoleGet {
  defaultRole {
    ...RoleSelection
  }
}

mutation roleCreateManaged($input: ManagedRoleInput!) {
  roleCreateManaged(input: $input) {
    __typename
    ... on RoleCreateSuccess {
      role {
        ...RoleSelection
      }
    }
  }
}

mutation roleCreateUnmanaged($input: UnmanagedRoleInput!) {
  roleCreateUnmanaged(input: $input) {
    __typename
    ... on RoleCreateSuccess {
      role {
        ...RoleSelection
      }
    }
  }
}

mutation roleUpdateManaged($id: ID!, $input: ManagedRoleInput!) {
  roleUpdateManaged(id: $id, input: $input) {
    __typename
    ... on RoleUpdateSuccess {
      role {
        ...RoleSelection
      }
    }
  }
}

mutation roleUpdateUnmanaged($id: ID!, $input: UnmanagedRoleInput!) {
  roleUpdateUnmanaged(id: $id, input: $input) {
    __typename
    ... on RoleUpdateSuccess {
      role {
        ...RoleSelection
      }
    }
  }
}

mutation roleDelete($id: ID!) {
  roleDelete(id: $id) {
    __typename
  }
}

mutation roleSetDefault($id: ID!) {
  roleSetDefault(id: $id) {
    __typename
    ... on RoleSetDefaultSuccess {
      role {
        ...RoleSelection
      }
    }
  }
}

mutation policyCreateManaged($input: ManagedPolicyInput!) {
  policyCreateManaged(input: $input) {
    __typename
    ...PolicySelection
    ...InvalidInputSelection
    ...OperationErrorSelection
  }
}

mutation policyCreateUnmanaged($input: UnmanagedPolicyInput!) {
  policyCreateUnmanaged(input: $input) {
    __typename
    ...PolicySelection
    ...InvalidInputSelection
    ...OperationErrorSelection
  }
}

mutation policyUpdateManaged($id: ID!, $input: ManagedPolicyInput!) {
  policyUpdateManaged(id: $id, input: $input) {
    __typename
    ...PolicySelection
    ...InvalidInputSelection
    ...OperationErrorSelection
  }
}

mutation policyUpdateUnmanaged($id: ID!, $input: UnmanagedPolicyInput!) {
  policyUpdateUnmanaged(id: $id, input: $input) {
    __typename
    ...PolicySelection
    ...InvalidInputSelection
    ...OperationErrorSelection
  }
}

mutation policyDelete($id: ID!) {
  policyDelete(id: $id) {
    __typename
    ...InvalidInputSelection
    ...OperationErrorSelection
  }
}

query usersGet($name: String!) {
  admin {
    user {
      get(name: $name) {
        ...UserSelection
      }
    }
  }
}

query usersList {
  admin {
    user {
      list {
        ...UserSelection
      }
    }
  }
}

mutation usersCreate($input: UserInput!) {
  admin {
    user {
      create(input: $input) {
        ...UserMutationSelection
      }
    }
  }
}

mutation usersDelete($name: String!) {
  admin {
    user {
      mutate(name: $name) {
        delete {
          ...InvalidInputSelection
          ...OperationErrorSelection
        }
      }
    }
  }
}

mutation usersSetEmail($email: String!, $name: String!) {
  admin {
    user {
      mutate(name: $name) {
        setEmail(email: $email) {
          ...UserMutationSelection
        }
      }
    }
  }
}

mutation usersSetAdmin($name: String!, $admin: Boolean!) {
  admin {
    user {
      mutate(name: $name) {
        setAdmin(admin: $admin) {
          ...UserMutationSelection
        }
      }
    }
  }
}

mutation usersSetActive($active: Boolean!, $name: String!) {
  admin {
    user {
      mutate(name: $name) {
        setActive(active: $active) {
          ...UserMutationSelection
        }
      }
    }
  }
}

mutation usersResetPassword($name: String!) {
  admin {
    user {
      mutate(name: $name) {
        resetPassword {
          ...InvalidInputSelection
          ...OperationErrorSelection
        }
      }
    }
  }
}

mutation usersSetRole($name: String!, $role: String!, $extraRoles: [String!], $append: Boolean!) {
  admin {
    user {
      mutate(name: $name) {
        setRole(role: $role, extraRoles: $extraRoles, append: $append) {
          ...UserSelection
          ...InvalidInputSelection
          ...OperationErrorSelection
        }
      }
    }
  }
}

mutation usersAddRoles($name: String!, $roles: [String!]!) {
  admin {
    user {
      mutate(name: $name) {
        addRoles(roles: $roles) {
          ...UserSelection
          ...InvalidInputSelection
          ...OperationErrorSelection
        }
      }
    }
  }
}

mutation usersRemoveRoles($name: String!, $roles: [String!]!, $fallback: String) {
  admin {
    user {
      mutate(name: $name) {
        removeRoles(roles: $roles, fallback: $fallback) {
          ...UserSelection
          ...InvalidInputSelection
          ...OperationErrorSelection
        }
      }
    }
  }
}

query ssoConfigGet {
  admin {
    ssoConfig {
      ...SsoConfigSelection
    }
  }
}

mutation ssoConfigSet($config: String) {
  admin {
    setSsoConfig(config: $config) {
      ...SsoConfigSelection
      ...InvalidInputSelection
      ...OperationErrorSelection
    }
  }
}

query bucketTabulatorTablesList($name: String!) {
  bucketConfig(name: $name) {
    tabulatorTables {
      name
      config
    }
  }
}

mutation bucketTabulatorTableSet($bucketName: String!, $tableName: String!, $config: String) {
  admin {
    bucketSetTabulatorTable(bucketName: $bucketName, tableName: $tableName, config: $config) {
      __typename
      ...InvalidInputSelection
      ...OperationErrorSelection
    }
  }
}

mutation bucketTabulatorTableRename($bucketName: String!, $tableName: String!, $newTableName: String!)  {
  admin {
    bucketRenameTabulatorTable(bucketName: $bucketName, tableName: $tableName, newTableName: $newTableName) {
      __typename
      ...InvalidInputSelection
      ...OperationErrorSelection
    }
  }
}

query tabulatorGetOpenQuery {
  admin {
    tabulatorOpenQuery
  }
}

mutation tabulatorSetOpenQuery($enabled: Boolean!) {
  admin {
    setTabulatorOpenQuery(enabled: $enabled) {
      tabulatorOpenQuery
    }
  }
}

fragment BucketConfigSelection on BucketConfig {
  name
  title
  iconUrl
  description
  overviewUrl
  tags
  relevanceScore
  lastIndexed
  snsNotificationArn
  scannerParallelShardsDepth
  skipMetaDataIndexing
  fileExtensionsToIndex
  indexContentBytes
  prefixes
}

fragment BucketAddResultSelection on BucketAddResult {
  __typename
  ... on BucketAddSuccess {
    bucketConfig {
      ...BucketConfigSelection
    }
  }
  ... on InsufficientPermissions {
    message
  }
}

fragment BucketUpdateResultSelection on BucketUpdateResult {
  __typename
  ... on BucketUpdateSuccess {
    bucketConfig {
      ...BucketConfigSelection
    }
  }
  ... on InsufficientPermissions {
    message
  }
}

fragment BucketRemoveResultSelection on BucketRemoveResult {
  __typename
}

query bucketGet($name: String!) {
  bucketConfig(name: $name) {
    ...BucketConfigSelection
  }
}

query bucketsList {
  bucketConfigs {
    ...BucketConfigSelection
  }
}

mutation bucketAdd($input: BucketAddInput!) {
  bucketAdd(input: $input) {
    ...BucketAddResultSelection
  }
}

mutation bucketUpdate($name: String!, $input: BucketUpdateInput!) {
  bucketUpdate(name: $name, input: $input) {
    ...BucketUpdateResultSelection
  }
}

mutation bucketRemove($name: String!) {
  bucketRemove(name: $name) {
    ...BucketRemoveResultSelection
  }
}

# API Keys - User operations

query apiKeysList($name: String, $fingerprint: String, $status: APIKeyStatus) {
  me {
    apiKeys(name: $name, fingerprint: $fingerprint, status: $status) {
      ...APIKeySelection
    }
  }
}

query apiKeyGet($id: ID!) {
  me {
    apiKey(id: $id) {
      ...APIKeySelection
    }
  }
}

mutation apiKeyCreate($input: APIKeyCreateInput!) {
  apiKeyCreate(input: $input) {
    __typename
    ... on APIKeyCreated {
      apiKey {
        ...APIKeySelection
      }
      secret
    }
    ...InvalidInputSelection
  }
}

mutation apiKeyRevoke($id: ID, $secret: String) {
  apiKeyRevoke(id: $id, secret: $secret) {
    __typename
    ...InvalidInputSelection
  }
}

# API Keys - Admin operations

query adminApiKeysList($email: String, $name: String, $fingerprint: String, $status: APIKeyStatus) {
  admin {
    apiKeys {
      list(email: $email, name: $name, fingerprint: $fingerprint, status: $status) {
        ...APIKeySelection
      }
    }
  }
}

query adminApiKeyGet($id: ID!) {
  admin {
    apiKeys {
      get(id: $id) {
        ...APIKeySelection
      }
    }
  }
}

mutation adminApiKeyRevoke($id: ID!) {
  admin {
    apiKeys {
      revoke(id: $id) {
        __typename
        ...InvalidInputSelection
      }
    }
  }
}
